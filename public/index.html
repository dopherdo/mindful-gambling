<!DOCTYPE html>
<html lang="en">
  <head>
    <script src="https://www.youtube.com/iframe_api"></script>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/money_face_emoji.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="Web site created using create-react-app"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->
    <title>Mindful Gambling</title>
  </head>
  <script src="https://www.youtube.com/iframe_api"></script>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <!-- Loading screen — auto-removed when React mounts -->
      <div id="app-loader" style="
        position: fixed; inset: 0; z-index: 9999;
        background: #0A0A0C;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        gap: 24px;
        font-family: 'Inter', -apple-system, sans-serif;
      ">
        <div style="position: relative; width: 80px; height: 80px;">
          <!-- Ghost logo (dim) -->
          <svg width="80" height="80" viewBox="0 0 140 140" fill="none" style="position:absolute;inset:0;opacity:0.12;">
            <rect x="12" y="22" width="68" height="96" rx="10" transform="rotate(-20 46 70)" fill="none" stroke="#666" stroke-width="2.5"/>
            <rect x="60" y="22" width="68" height="96" rx="10" transform="rotate(12 94 70)" fill="none" stroke="#666" stroke-width="2.5"/>
          </svg>
          <!-- Animated fill logo -->
          <svg width="80" height="80" viewBox="0 0 140 140" fill="none" style="position:absolute;inset:0;">
            <defs>
              <linearGradient id="loader-back-s" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#888"/><stop offset="100%" stop-color="#333"/>
              </linearGradient>
              <linearGradient id="loader-front-s" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#fff"/><stop offset="60%" stop-color="#c0c0c0"/><stop offset="100%" stop-color="#606060"/>
              </linearGradient>
              <!-- Diagonal wipe mask -->
              <linearGradient id="loader-wipe" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="white">
                  <animate attributeName="offset" values="-0.5;1" dur="1.6s" repeatCount="indefinite"/>
                </stop>
                <stop offset="30%" stop-color="white">
                  <animate attributeName="offset" values="-0.2;1.3" dur="1.6s" repeatCount="indefinite"/>
                </stop>
                <stop offset="30%" stop-color="black">
                  <animate attributeName="offset" values="-0.2;1.3" dur="1.6s" repeatCount="indefinite"/>
                </stop>
                <stop offset="100%" stop-color="black">
                  <animate attributeName="offset" values="0.5;2" dur="1.6s" repeatCount="indefinite"/>
                </stop>
              </linearGradient>
              <mask id="loader-mask">
                <rect width="140" height="140" fill="url(#loader-wipe)"/>
              </mask>
            </defs>
            <g mask="url(#loader-mask)">
              <rect x="12" y="22" width="68" height="96" rx="10" transform="rotate(-20 46 70)" fill="#1c1c1c" stroke="url(#loader-back-s)" stroke-width="2.5"/>
              <rect x="60" y="22" width="68" height="96" rx="10" transform="rotate(12 94 70)" fill="#1c1c1c" stroke="url(#loader-front-s)" stroke-width="2.5"/>
            </g>
          </svg>
        </div>
        <div style="color: rgba(255,255,255,0.2); font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase;">Loading</div>
      </div>
    </div>
    <!--
      This HTML file is a template.
      If you open it directly in the browser, you will see an empty page.

      You can add webfonts, meta tags, or analytics to this file.
      The build step will place the bundled scripts into the <body> tag.

      To begin the development, run `npm start` or `yarn start`.
      To create a production bundle, use `npm run build` or `yarn build`.
    -->
  </body>
</html>
